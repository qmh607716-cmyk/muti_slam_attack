lio_sam:

  # Topics — matched to handheld.bag
  pointCloudTopic: "/points_raw"               # Point cloud data
  imuTopic: "/imu_correct"                    # IMU data (handheld.bag uses imu_correct, not imu_raw)
  odomTopic: "odometry/imu"                   # IMU pre-preintegration odometry
  gpsTopic: "odometry/gpsz"                  # GPS odometry topic (not present in handheld.bag)

  # Frames
  lidarFrame: "base_link"
  baselinkFrame: "base_link"
  odometryFrame: "odom"
  mapFrame: "map"

  # GPS Settings — disabled (no GPS in handheld.bag)
  useImuHeadingInitialization: false
  useGpsElevation: false
  gpsCovThreshold: 2.0
  poseCovThreshold: 25.0

  # Export settings
  savePCD: false
  savePCDDirectory: "/Downloads/LOAM/"

  # Sensor Settings — matched to handheld.bag (Livox Horizon, 16 non-repeating scan lines)
  sensor: livox
  N_SCAN: 16
  Horizon_SCAN: 4000
  timeField: "time"
  downsampleRate: 1
  lidarMinRange: 1.0
  lidarMaxRange: 1000.0

  # IMU Settings — same as LVI-SAM
  imuAccNoise: 3.9939570888238808e-03
  imuGyrNoise: 1.5636343949698187e-03
  imuAccBiasN: 6.4356659353532566e-05
  imuGyrBiasN: 3.5640318696367613e-05
  imuGravity: 9.80511
  imuRPYWeight: 0.01

  # Extrinsics: T_lb (lidar -> imu) — identical to LVI-SAM config
  extrinsicTrans: [0.0, 0.0, 0.0]
  extrinsicRot: [-1, 0, 0,
                 0, 1, 0,
                 0, 0, -1]
  extrinsicRPY: [0, -1, 0,
                  1, 0, 0,
                  0, 0, 1]

  # LOAM feature threshold
  edgeThreshold: 1.0
  surfThreshold: 0.1
  edgeFeatureMinValidNum: 10
  surfFeatureMinValidNum: 100

  # voxel filter params
  odometrySurfLeafSize: 0.4
  mappingCornerLeafSize: 0.2
  mappingSurfLeafSize: 0.4

  # robot motion constraint
  z_tollerance: 1000
  rotation_tollerance: 1000

  # CPU Params
  numberOfCores: 4
  mappingProcessInterval: 0.15

  # Surrounding map
  surroundingkeyframeAddingDistThreshold: 1.0
  surroundingkeyframeAddingAngleThreshold: 0.2
  surroundingKeyframeDensity: 2.0
  surroundingKeyframeSearchRadius: 50.0

  # Loop closure — enable scan-to-scan ICP loop closure (no visual)
  loopClosureEnableFlag: true
  loopClosureFrequency: 1.0
  surroundingKeyframeSize: 50
  historyKeyframeSearchRadius: 15.0
  historyKeyframeSearchTimeDiff: 30.0
  historyKeyframeSearchNum: 25
  historyKeyframeFitnessScore: 0.3
  historyKeyframePoseDistFallback: 1.5  # meters, proxy fallback: add loop even if ICP fails but pose dist is small

  # Visualization
  globalMapVisualizationSearchRadius: 1000.0
  globalMapVisualizationPoseDensity: 10.0
  globalMapVisualizationLeafSize: 1.0
